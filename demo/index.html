<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>检测</title>
    <style>
        :root {
            --touch-size: 60px;
            --active-glow: rgba(0, 255, 115, 0.8);
            --final-glow: rgba(255, 105, 180, 0.8);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        #status-label {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            z-index: 999;
            pointer-events: none;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        .status-waiting { color: #ff4d4f; }
        .status-success { color: #52c41a; text-shadow: 0 0 10px rgba(82,196,26,0.5); }
        .status-final { color: #ff69b4; text-shadow: 0 0 20px #ff69b4; font-size: 28px; }

        .touch-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 0 6%;
            position: relative;
            z-index: 1;
        }

        .top-group, .finger-layer {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .visible {
            visibility: visible;
            opacity: 1;
        }

        .top-group {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 60px;
        }

        .side-group {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 50%;
            margin-bottom: 5vh;
            align-self: flex-end;
        }

        .touch-point {
            width: var(--touch-size);
            height: var(--touch-size);
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            transition: all 0.1s ease;
        }

        .touch-point.glowing {
            background-color: rgba(0, 255, 115, 0.2);
            border-color: #00ff73;
            color: #fff;
            box-shadow: 0 0 15px var(--active-glow), inset 0 0 10px var(--active-glow);
            transform: scale(1.1);
        }

        #device-error {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            padding: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="device-error">请在安卓手机上打开</div>

    <div id="status-label" class="status-waiting">请将双手的食指放到两侧</div>

    <div class="touch-container">
        <div id="top-group" class="top-group">
            <div class="touch-point" id="T1">T1</div>
            <div class="touch-point" id="T2">T2</div>
        </div>

        <div class="side-group">
            <div class="touch-point finger-layer" id="L1">尾指</div>
            <div class="touch-point finger-layer" id="L2">无名指</div>
            <div class="touch-point finger-layer" id="L3">中指</div>
            <div class="touch-point visible" id="L4">食指</div>
        </div>

        <div class="side-group">
            <div class="touch-point finger-layer" id="R1">尾指</div>
            <div class="touch-point finger-layer" id="R2">无名指</div>
            <div class="touch-point finger-layer" id="R3">中指</div>
            <div class="touch-point visible" id="R4">食指</div>
        </div>
    </div>

    <script>
        (function() {
            const ua = navigator.userAgent.toLowerCase();
            const isAndroid = ua.indexOf("android") > -1;
            if (!isAndroid) {
                document.getElementById('device-error').style.display = 'flex';
                return;
            }

            const statusLabel = document.getElementById('status-label');
            const topGroup = document.getElementById('top-group');
            const points = document.querySelectorAll('.touch-point');
            const touchState = { T1: false, T2: false, L1: false, L2: false, L3: false, L4: false, R1: false, R2: false, R3: false, R4: false };

            function updateUI() {
                const indexOn = touchState.L4 && touchState.R4;
                const middleOn = indexOn && touchState.L3 && touchState.R3;
                const ringOn = middleOn && touchState.L2 && touchState.R2;
                const littleOn = ringOn && touchState.L1 && touchState.R1;
                const allOn = littleOn && touchState.T1 && touchState.T2;

                document.getElementById('L3').classList.toggle('visible', indexOn);
                document.getElementById('R3').classList.toggle('visible', indexOn);
                document.getElementById('L2').classList.toggle('visible', middleOn);
                document.getElementById('R2').classList.toggle('visible', middleOn);
                document.getElementById('L1').classList.toggle('visible', ringOn);
                document.getElementById('R1').classList.toggle('visible', ringOn);
                topGroup.classList.toggle('visible', littleOn);

                if (allOn) {
                    statusLabel.textContent = "我们两个结婚吧";
                    statusLabel.className = "status-final";
                } else if (littleOn) {
                    statusLabel.textContent = "再找身边一个人触发上面";
                    statusLabel.className = "status-success";
                } else if (ringOn) {
                    statusLabel.textContent = "请按下尾指";
                    statusLabel.className = "status-waiting";
                } else if (middleOn) {
                    statusLabel.textContent = "请按下无名指";
                    statusLabel.className = "status-waiting";
                } else if (indexOn) {
                    statusLabel.textContent = "请按下中指";
                    statusLabel.className = "status-waiting";
                } else {
                    statusLabel.textContent = "请把左右食指放到两侧";
                    statusLabel.className = "status-waiting";
                }
            }

            points.forEach(p => {
                const handleTouch = (val) => (e) => {
                    e.preventDefault(); e.stopPropagation();
                    if (val && !p.classList.contains('visible')) return;
                    touchState[p.id] = val;
                    p.classList.toggle('glowing', val);
                    updateUI();
                };
                p.addEventListener('touchstart', handleTouch(true), {passive: false});
                p.addEventListener('touchend', handleTouch(false));
                p.addEventListener('touchcancel', handleTouch(false));
                p.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
            });

            document.addEventListener('touchstart', e => { if(e.touches.length > 1) e.preventDefault(); }, {passive: false});
            document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
            document.addEventListener('contextmenu', e => e.preventDefault());
        })();
    </script>
</body>
</html>
