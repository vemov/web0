<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 跳转中...</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            text-align: center;
        }
        #status-message {
            padding: 20px;
            max-width: 80%;
        }
        .error-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="status-message">正在检测环境...</div>
    <script>
        (function() {
            const statusBox = document.getElementById('status-message');
            const targetModel = "辉夜姬.usdz";
            const ua = window.navigator.userAgent;
            const isIPhone = /iPhone/i.test(ua);
            const isSafari = isIPhone && /Safari/i.test(ua) && !/CriOS/i.test(ua) && !/FxiOS/i.test(ua);
            const tempAnchor = document.createElement('a');
            const supportsAR = tempAnchor.relList && tempAnchor.relList.supports && tempAnchor.relList.supports('ar');
            if (isIPhone && supportsAR) {
                statusBox.innerHTML = "正在启动 AR 体验...";
                window.location.replace(targetModel);
            } else {
                statusBox.innerHTML = `
                    <div class="error-icon">ios</div>
                    <h2 style="margin: 10px 0;">需要 iPhone Safari</h2>
                    <p style="color: #86868b; line-height: 1.5;">
                        检测到当前环境无法直接运行 AR 预览。<br>
                        请复制链接并在 <b>iPhone 自带的 Safari 浏览器</b> 中打开。<br>
                        <small>(需 iOS 12.0 或更高版本)</small>
                    </p>
                `;
            }
        })();
    </script>
</body>
</html>
