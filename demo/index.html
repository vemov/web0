<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLTF Viewer - Static Center</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 10px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid #333; z-index: 10; }
        #force-overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; }
        #btn-confirm { padding: 20px 60px; background: #ffffff; color: #000; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
        #loading-msg { position: absolute; bottom: 10%; color: white; font-size: 12px; display: none; }
    </style>
</head>
<body>

<div id="force-overlay">
    <p style="margin-bottom: 30px; opacity: 0.8;">系统要求：开启传感器权限以载入 3D 空间</p>
    <button id="btn-confirm">确认并进入</button>
    <div id="loading-msg">正在努力加载 3D 资源...</div>
</div>

<div id="hud">VIEWPORT: READY</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let isRunning = false;

    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 0); 
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding; 
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);

        document.getElementById('loading-msg').style.display = 'block';

        const loader = new GLTFLoader();
        loader.load(
            '11121.glb', 
            (gltf) => {
                const model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); 
                
                scene.add(model);
                document.getElementById('loading-msg').style.display = 'none';
            },
            (xhr) => {
                const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                document.getElementById('loading-msg').innerText = `加载中: ${percent}%`;
            },
            (error) => {
                console.error('模型加载失败', error);
                document.getElementById('loading-msg').innerText = '模型加载失败，请检查文件路径';
            }
        );

        controls = new DeviceOrientationControls(camera);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isRunning) {
            if (controls) controls.update();
            const { x, y, z } = camera.rotation;
            document.getElementById('hud').innerText = `ROTATION:\nX: ${x.toFixed(3)}\nY: ${y.toFixed(3)}\nZ: ${z.toFixed(3)}`;
            renderer.render(scene, camera);
        }
    }

    document.getElementById('btn-confirm').onclick = async () => {
        try {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const status = await DeviceOrientationEvent.requestPermission();
                if (status !== 'granted') {
                    alert("需要传感器权限才能浏览。");
                    return;
                }
            }
            
            document.getElementById('force-overlay').style.display = 'none';
            isRunning = true;
            await init();
            animate();
            
        } catch (e) {
            console.error(e);
            alert("初始化失败，请在 HTTPS 环境及移动设备下尝试。");
        }
    };

    window.addEventListener('resize', () => {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
