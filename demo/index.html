<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GitHub Pages FFmpeg WASM</title>
    <script src="coi-serviceworker.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        #log { background: #000; color: #0f0; padding: 10px; height: 150px; overflow-y: auto; font-size: 12px; margin-top: 10px; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h3>FFmpeg M4A 歌词写入 (GitHub版)</h3>
        <input type="file" id="audio-in" accept=".m4a,.mp3"><br><br>
        <textarea id="lrc-text" style="width:100%;height:100px" placeholder="在此粘贴LRC歌词..."></textarea><br><br>
        <button id="run-btn" disabled>正在载入 WASM...</button>
        <div id="log">正在初始化...</div>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile, toBlobURL } = FFmpegUtil;
        let ffmpeg = new FFmpeg();

        async function init() {
            const logDiv = document.getElementById('log');
            ffmpeg.on('log', ({ message }) => {
                logDiv.innerText += "\n" + message;
                logDiv.scrollTop = logDiv.scrollHeight;
            });

            const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
            
            document.getElementById('run-btn').innerText = "开始处理";
            document.getElementById('run-btn').disabled = false;
            logDiv.innerText += "\nFFmpeg 已就绪！";
        }

        document.getElementById('run-btn').onclick = async () => {
            const audioFile = document.getElementById('audio-in').files[0];
            const lrc = document.getElementById('lrc-text').value;
            if(!audioFile) return alert("请选文件");

            document.getElementById('run-btn').disabled = true;
            
            await ffmpeg.writeFile('input', await fetchFile(audioFile));
            // 写入歌词到 metadata
            await ffmpeg.exec(['-i', 'input', '-metadata', `lyrics=${lrc}`, '-c', 'copy', 'output.m4a']);
            
            const data = await ffmpeg.readFile('output.m4a');
            const url = URL.createObjectURL(new Blob([data.buffer], {type: 'audio/mp4'}));
            const a = document.createElement('a');
            a.href = url;
            a.download = "output_" + audioFile.name;
            a.click();
            
            document.getElementById('run-btn').disabled = false;
        };

        init();
    </script>
</body>
</html>
