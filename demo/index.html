<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AR 展示页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f5f5f7;
        }
        .ar-link {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #1d1d1f;
            transition: transform 0.2s ease;
        }
        .ar-link:active {
            transform: scale(0.95);
        }
        .preview-img {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: white;
            object-fit: cover;
        }
        .btn-label {
            margin-top: 15px;
            display: inline-block;
            padding: 8px 16px;
            background-color: #007AFF;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>AR 交互体验</h1>
    
    <a class="ar-link" rel="ar" href="CosmonautSuit_en.reality">
        <img src="https://developer.apple.com/augmented-reality/quick-look/models/cosmonaut/cosmonaut_2x.png" 
             alt="模型预览图" 
             width="300" 
             height="300" 
             class="preview-img">
        <br>
        <span class="btn-label">点击进入 AR 世界</span>
    </a>

</body>
</html>
