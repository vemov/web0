<!DOCTYPE html>
<html lang="zh">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="max-age=2592000, public">
    <meta property="og:image" content="./logo.jpg">
    <meta property="og:image:secure_url" content="./logo.jpg">
    <link rel="apple-touch-icon" href="./logo.jpg">
    <link rel="shortcut icon" href="./logo.jpg">
    <link rel="icon" href="./logo.jpg">
    <link rel="apple-touch-icon-precomposed" href="./logo.jpg">
    <meta name="msapplication-TileImage" content="./logo.jpg">
    <title>体适能</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(
                to bottom,
                #ffffff 0%,
                #ffffff 50%,
                #ffffff 50%,
                #ffffff 100%
            );
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .comic-container {
            width: 100%;
            max-width: 900px;
            padding: 0;
            box-sizing: border-box;
        }
        .image-wrapper {
            width: 100%;
            margin-bottom: 0;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        #controls {
            padding: 20px;
            width: 100%;
            text-align: center;
            background: white;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="controls" id="controls">
        <input type="file" id="uploadBase" accept="image/*">
    </div>
    <div id="comic-container" class="comic-container">
        <div class="image-wrapper" id="image-wrapper">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const controls = document.getElementById('controls');
        const maskImg = new Image();
        let baseImg = null;
        let maskLoaded = false;

        function draw() {
            if (!maskLoaded) return;
            const wrapper = document.getElementById('image-wrapper');
            const wrapperWidth = wrapper.getBoundingClientRect().width;
            const ratio = maskImg.height / maskImg.width;
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = wrapperWidth * dpr;
            canvas.height = wrapperWidth * ratio * dpr;
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, wrapperWidth, wrapperWidth * ratio);

            if (baseImg) {
                ctx.drawImage(baseImg, 0, 0, wrapperWidth, wrapperWidth * ratio);
            }
            ctx.drawImage(maskImg, 0, 0, wrapperWidth, wrapperWidth * ratio);
        }

        maskImg.src = "./input.png?v=" + Date.now();
        maskImg.onload = () => {
            maskLoaded = true;
            draw();
        };

        document.getElementById('uploadBase').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                baseImg = new Image();
                baseImg.onload = () => {
                    draw();
                    controls.style.display = 'none';
                };
                baseImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
