<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta property="og:image" content="./logo.jpg">
<meta property="og:image:secure_url" content="./logo.jpg">
<link rel="apple-touch-icon" href="./logo.jpg">
<link rel="shortcut icon" href="./logo.jpg">
<link rel="icon" href="./logo.jpg">
<link rel="apple-touch-icon-precomposed" href="./logo.jpg">
<meta name="msapplication-TileImage" content="./logo.jpg">
<title></title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;

    background: #ffffff;
    overflow: hidden;

    /* ⭐ 关键：避免浏览器UI干扰 */
    position: fixed;
    top: 0;
    left: 0;
}

/* 全屏图片 */
img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    display: block;

    /* 防止长按弹菜单 */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}
</style>
</head>

<body>

<img src="input.jpg" alt="image">

<script>
// ⭐ 尝试进入全屏模式（部分浏览器支持）
function goFull() {
    let doc = document.documentElement;

    if (doc.requestFullscreen) {
        doc.requestFullscreen();
    } else if (doc.webkitRequestFullscreen) {
        doc.webkitRequestFullscreen();
    }
}

// 自动尝试全屏（需要用户交互才稳定）
window.addEventListener("click", goFull, { once: true });
window.addEventListener("touchstart", goFull, { once: true });
</script>

</body>
</html>
