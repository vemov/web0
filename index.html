<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Constant Velocity & Collision</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #btn-start { padding: 18px 50px; font-size: 16px; background: #007aff; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 10px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid #333; line-height: 1.5; }
        #move-ctrl { 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 70px; 
            height: 70px; 
            background: rgba(255,255,255,0.1); 
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; 
            display: none; 
            justify-content: center; 
            align-items: center;
            touch-action: none;
            z-index: 50;
        }
        #move-ctrl:active { background: rgba(0,122,255,0.3); border-color: #007aff; }
        #move-ctrl::after { content: "▲"; color: white; font-size: 20px; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>匀速动力学空间</h2>
    <p style="opacity:0.6; font-size:13px;">通过手机陀螺仪移动视角</p>
    <button id="btn-start">初始化环境</button>
</div>

<div id="hud">STATUS: READY</div>
<div id="move-ctrl"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';

    let scene, camera, renderer, controls, player;
    let isRunning = false;
    let isMoving = false;
    let clock = new THREE.Clock();
    let collidableObjects = [];
    let raycaster = new THREE.Raycaster();
    
    const physics = {
        speed: 2.5, 
        height: 1.7,
        collisionRadius: 1.0
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x020202, 10, 50);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 100, 0x222222, 0x111111);
        scene.add(grid);

        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const light = new THREE.PointLight(0x007aff, 2, 50);
        light.position.set(0, 10, 0);
        scene.add(light);

        const boxGeo = new THREE.BoxGeometry(2, 6, 2);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.5, roughness: 0.2 });

        for(let i=0; i<40; i++) {
            const box = new THREE.Mesh(boxGeo, boxMat);
            const x = Math.random() * 80 - 40;
            const z = Math.random() * 80 - 40;
            if (Math.abs(x) < 5 && Math.abs(z) < 5) continue; 
            box.position.set(x, 3, z);
            scene.add(box);
            collidableObjects.push(box);
        }

        player = new THREE.Group();
        player.position.set(0, physics.height, 0);
        player.add(camera);
        scene.add(player);

        controls = new DeviceOrientationControls(camera);
    }

    function checkCollision(direction) {
        if (direction.lengthSq() === 0) return false;
        raycaster.set(player.position, direction);
        const intersections = raycaster.intersectObjects(collidableObjects);
        return intersections.length > 0 && intersections[0].distance < physics.collisionRadius;
    }

    function update() {
        const dt = clock.getDelta();
        if (!isRunning) return;

        controls.update();

        if (isMoving) {
            const moveDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            moveDir.y = 0;
            moveDir.normalize();

            if (!checkCollision(moveDir)) {
                player.position.addScaledVector(moveDir, physics.speed * dt);
            }
        }

        document.getElementById('hud').innerText = `VELOCITY: ${isMoving ? physics.speed : 0} m/s\nCOORDINATES: ${player.position.x.toFixed(2)}, ${player.position.z.toFixed(2)}`;
    }

    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    const moveBtn = document.getElementById('move-ctrl');
    ['touchstart', 'mousedown'].forEach(ev => moveBtn.addEventListener(ev, (e) => { e.preventDefault(); isMoving = true; }));
    ['touchend', 'mouseup', 'mouseleave'].forEach(ev => moveBtn.addEventListener(ev, () => { isMoving = false; }));

    document.getElementById('btn-start').onclick = async () => {
        try {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            document.getElementById('overlay').style.display = 'none';
            moveBtn.style.display = 'flex';
            isRunning = true;
            init();
            animate();
        } catch (e) { console.error(e); }
    };

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
