<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陀螺仪小球控制演示</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #ball {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            will-change: left, top;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
        }
        #btn-permission {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="info">倾斜手机以移动小球</div>
    <div id="ball"></div>
    <button id="btn-permission">开始运行</button>
</div>

<script>
    const ball = document.getElementById('ball');
    const btn = document.getElementById('btn-permission');
    const info = document.getElementById('info');

    // 物理参数
    let posX = window.innerWidth / 2;
    let posY = window.innerHeight / 2;
    let velX = 0;
    let velY = 0;
    const friction = 0.98; // 摩擦力
    const sensitivity = 0.15; // 灵敏度

    function handleOrientation(event) {
        let x = event.gamma; // 左右倾斜 (-90 to 90)
        let y = event.beta;  // 前后倾斜 (-180 to 180)

        // 修正逻辑：如果用户横屏或姿态异常，可在此调整映射
        velX += x * sensitivity;
        velY += y * sensitivity;

        updatePosition();
        
        info.innerHTML = `Beta: ${Math.round(y)} | Gamma: ${Math.round(x)}`;
    }

    function updatePosition() {
        velX *= friction;
        velY *= friction;

        posX += velX;
        posY += velY;

        // 边界检测
        const radius = 25;
        if (posX < radius) { posX = radius; velX *= -0.5; }
        if (posX > window.innerWidth - radius) { posX = window.innerWidth - radius; velX *= -0.5; }
        if (posY < radius) { posY = radius; velY *= -0.5; }
        if (posY > window.innerHeight - radius) { posY = window.innerHeight - radius; velY *= -0.5; }

        ball.style.left = posX + 'px';
        ball.style.top = posY + 'px';

        requestAnimationFrame(updatePosition);
    }

    // 权限处理（针对 iOS 13+ 的安全要求）
    btn.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        init();
                    }
                })
                .catch(console.error);
        } else {
            // 非 iOS 设备直接初始化
            init();
        }
    };

    function init() {
        btn.style.display = 'none';
        window.addEventListener('deviceorientation', handleOrientation);
        requestAnimationFrame(updatePosition);
    }

    // 处理窗口缩放
    window.onresize = () => {
        posX = window.innerWidth / 2;
        posY = window.innerHeight / 2;
    };
</script>
</body>
</html>
