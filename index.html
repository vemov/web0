<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual-Inertial Odometry Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { padding: 20px 50px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 40px; cursor: pointer; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; }
        #view-debug { position: absolute; bottom: 10px; right: 10px; width: 120px; height: 90px; border: 1px solid #555; opacity: 0.5; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>视觉+惯性融合动力学</h2>
    <p>将使用后置摄像头识别地面纹理偏移</p>
    <button id="btn-start">授权并初始化</button>
</div>
<div id="hud">VIO STATUS: WAITING</div>
<video id="view-debug" autoplay playsinline muted></video>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';

    let scene, camera, renderer, controls, player, video;
    let isRunning = false;
    let clock = new THREE.Clock();
    let prevFrameData = null;
    
    const physics = {
        vel: new THREE.Vector3(),
        visBoost: 0,
        friction: 0.85,
        height: 1.7
    };

    async function initCamera() {
        video = document.getElementById('view-debug');
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 160, height: 120 } 
        });
        video.srcObject = stream;
    }

    function processVisualOdometry() {
        if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return;

        const canvas = document.createElement('canvas');
        canvas.width = 40; canvas.height = 30;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        if (prevFrameData) {
            let diff = 0;
            for (let i = 0; i < currentFrame.length; i += 4) {
                diff += Math.abs(currentFrame[i] - prevFrameData[i]);
            }
            // 粗略估算：像素剧烈变化通常代表物理位移
            physics.visBoost = Math.max(0, (diff / 100000) - 0.5);
        }
        prevFrameData = currentFrame;
    }

    function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 100, 0x444444, 0x222222);
        scene.add(grid);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        player = new THREE.Group();
        player.position.y = physics.height;
        player.add(camera);
        scene.add(player);

        controls = new DeviceOrientationControls(camera);
    }

    function handleMotion(e) {
        if (!isRunning) return;
        const acc = e.acceleration;
        const worldAcc = new THREE.Vector3(acc.x, 0, acc.z).applyQuaternion(camera.quaternion);
        worldAcc.y = 0;
        
        // 融合视觉：如果摄像头检测到运动，大幅增强加速度响应
        const multiplier = 1.0 + (physics.visBoost * 5.0);
        physics.vel.addScaledVector(worldAcc, 0.08 * multiplier);
    }

    function update() {
        const dt = clock.getDelta();
        controls.update();
        processVisualOdometry();

        physics.vel.multiplyScalar(physics.friction);
        
        // 注入视觉产生的恒定前向模拟（如果检测到运动）
        if (physics.visBoost > 1.0) {
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            dir.y = 0;
            player.position.addScaledVector(dir, physics.visBoost * 0.05);
        }

        player.position.addScaledVector(physics.vel, dt * 5);
        
        document.getElementById('hud').innerText = `VISUAL_MOTION: ${physics.visBoost.toFixed(2)}\nVEL: ${physics.vel.length().toFixed(2)}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    document.getElementById('btn-start').onclick = async () => {
        try {
            await initCamera();
            if (typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission();
            if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
            
            document.getElementById('overlay').style.display = 'none';
            isRunning = true;
            initScene();
            window.addEventListener('devicemotion', handleMotion, true);
            animate();
        } catch (e) { alert("需要摄像头与传感器权限"); }
    };
</script>
</body>
</html>
