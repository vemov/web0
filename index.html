<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Kinematics - Stable Ground Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 16px 40px; font-size: 18px; cursor: pointer;
            background: #007aff; color: white; border: none; border-radius: 30px;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0;
            font-family: monospace; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h2>高精度地面模式</h2>
    <p>垂直握持手机以同步<br>爆发性向上提拉触发跳跃</p>
    <button id="btn-start">初始化传感器</button>
</div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, ball;
    let isRunning = false;
    let clock = new THREE.Clock();
    
    const velocity = new THREE.Vector3();
    const gravity = -20.0; 
    const jumpStrength = 10.0;
    const moveStrength = 55.0;
    const friction = 0.9;
    const angleDeadzone = 0.25; 
    const jumpThreshold = 25.0; 

    const state = { alpha: 0, beta: 90, gamma: 0, canJump: true };
    let baseBeta = 90;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(500, 50, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        for (let i = 0; i < 60; i++) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2, 2),
                new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
            );
            mesh.position.set(Math.random()*200-100, 1, Math.random()*200-100);
            scene.add(mesh);
        }

        ball = new THREE.Group();
        ball.position.y = 2; 
        ball.add(camera);
        scene.add(ball);
    }

    function handleMotion(e) {
        const acc = e.accelerationIncludingGravity;
        if (!acc) return;
        
        const verticalForce = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        if (verticalForce > jumpThreshold && state.canJump && ball.position.y <= 2.05) {
            velocity.y = jumpStrength;
            state.canJump = false;
            setTimeout(() => { state.canJump = true; }, 800);
        }
    }

    function handleOrientation(e) {
        state.alpha = e.alpha || 0;
        state.beta = e.beta || 90;
        state.gamma = e.gamma || 0;
    }

    function update(dt) {
        const d2r = Math.PI / 180;
        
        const euler = new THREE.Euler(
            (state.beta - 90) * d2r,
            state.alpha * d2r,
            -state.gamma * d2r,
            'YXZ'
        );
        ball.quaternion.setFromEuler(euler);

        const rawForce = (baseBeta - state.beta) / 45;
        if (Math.abs(rawForce) > angleDeadzone) {
            const force = (rawForce - (Math.sign(rawForce) * angleDeadzone)) * moveStrength;
            
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(ball.quaternion);
            forward.y = 0; 
            forward.normalize();
            
            velocity.x += forward.x * force * dt;
            velocity.z += forward.z * force * dt;
        }

        velocity.x *= friction;
        velocity.z *= friction;
        velocity.y += gravity * dt;

        ball.position.addScaledVector(velocity, dt);

        if (ball.position.y < 2) {
            ball.position.y = 2;
            velocity.y = 0;
        }

        document.getElementById('hud').innerText = `SPD: ${velocity.length().toFixed(2)}\nJUMP_RDY: ${state.canJump}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update(clock.getDelta());
        renderer.render(scene, camera);
    }

    document.getElementById('btn-start').onclick = function() {
        const p1 = typeof DeviceOrientationEvent.requestPermission === 'function' ? DeviceOrientationEvent.requestPermission() : Promise.resolve('granted');
        const p2 = typeof DeviceMotionEvent.requestPermission === 'function' ? DeviceMotionEvent.requestPermission() : Promise.resolve('granted');
        Promise.all([p1, p2]).then(res => {
            if (res.every(v => v === 'granted')) {
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;
                init();
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                setTimeout(() => { baseBeta = state.beta; }, 300);
                animate();
            }
        });
    };
</script>
</body>
</html>
