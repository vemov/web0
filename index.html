<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Fidelity 6-DOF Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { padding: 20px 50px; font-size: 18px; background: #007aff; color: white; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>完善级空间动力学</h2>
    <p>包含实时光影追踪与地面反馈<br>请垂直握持手机开始</p>
    <button id="btn-start">初始化环境</button>
</div>
<div id="hud">STATUS: STANDBY</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';

    let scene, camera, renderer, controls, player;
    let isRunning = false;
    let clock = new THREE.Clock();
    
    const physics = {
        vel: new THREE.Vector3(),
        acc: new THREE.Vector3(),
        friction: 0.92,
        sensitivity: 18.0,
        lowPass: 0.1,
        height: 1.7
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 10, 80);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 地面：使用标准材质接收阴影
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.2 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 环境光源
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        // 主光源：投射阴影
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(20, 40, 20);
        sun.castShadow = true;
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        scene.add(sun);

        // 障碍物
        for(let i=0; i<40; i++) {
            const h = Math.random() * 5 + 1;
            const box = new THREE.Mesh(
                new THREE.BoxGeometry(2, h, 2),
                new THREE.MeshStandardMaterial({ color: 0x555555 })
            );
            box.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        }

        player = new THREE.Group();
        player.position.y = physics.height;
        player.add(camera);
        scene.add(player);

        // 代表玩家的影子实体（隐藏模型但保留阴影）
        const proxy = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({visible: false}));
        proxy.castShadow = true;
        player.add(proxy);

        controls = new DeviceOrientationControls(camera);
    }

    function handleMotion(e) {
        if (!isRunning || !e.acceleration) return;
        const rawAcc = new THREE.Vector3(e.acceleration.x, e.acceleration.y, e.acceleration.z);
        
        // 滤波处理
        physics.acc.lerp(rawAcc, physics.lowPass);

        if (physics.acc.length() > 0.5) {
            const worldDir = physics.acc.clone();
            worldDir.applyQuaternion(camera.quaternion);
            
            // 锁定地面运动并保留跳跃感
            if (Math.abs(physics.acc.y) < 3.0) worldDir.y = 0;
            
            physics.vel.addScaledVector(worldDir, physics.sensitivity * 0.01);
        }
    }

    function update() {
        const dt = clock.getDelta();
        controls.update();

        physics.vel.multiplyScalar(physics.friction);
        player.position.addScaledVector(physics.vel, dt * 10);

        if (player.position.y < physics.height) {
            player.position.y = physics.height;
            physics.vel.y = 0;
        }

        document.getElementById('hud').innerText = `POS: X:${player.position.x.toFixed(2)} Z:${player.position.z.toFixed(2)}\nFPS: ${Math.round(1/dt)}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    document.getElementById('btn-start').onclick = async () => {
        const res = await Promise.all([
            typeof DeviceOrientationEvent.requestPermission === 'function' ? DeviceOrientationEvent.requestPermission() : 'granted',
            typeof DeviceMotionEvent.requestPermission === 'function' ? DeviceMotionEvent.requestPermission() : 'granted'
        ]);

        if (res.every(s => s === 'granted')) {
            document.getElementById('overlay').style.display = 'none';
            isRunning = true;
            init();
            window.addEventListener('devicemotion', handleMotion, true);
            animate();
        }
    };
</script>
</body>
</html>
