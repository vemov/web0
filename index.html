<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 空间距离感应器</title>
    <style>
        :root { --distance-color: #007aff; }
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        #radar { width: 250px; height: 250px; border-radius: 50%; border: 2px solid var(--distance-color); display: flex; align-items: center; justify-content: center; position: relative; transition: 0.1s; }
        #radar::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--distance-color); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        #value { font-size: 64px; font-weight: 200; font-variant-numeric: tabular-nums; }
        .unit { font-size: 20px; color: #8e8e93; }
        
        .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; }
        button { background: #fff; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 600; font-size: 18px; }
    </style>
</head>
<body>

    <div id="radar">
        <div>
            <span id="value">0.00</span>
            <span class="unit">m</span>
        </div>
    </div>
    
    <p id="status" style="color: #8e8e93; margin-top: 20px;">等待授权空间传感器...</p>

    <div class="controls">
        <button id="startBtn">开始追踪空间位移</button>
    </div>

    <script>
        let isTracking = false;
        let distance = 0;
        let lastAccel = { x: 0, y: 0, z: 0 };
        let velocity = { x: 0, y: 0, z: 0 };

        const valueDisplay = document.getElementById('value');
        const statusText = document.getElementById('status');
        const radar = document.getElementById('radar');

        async function startSpaceTracking() {
            // 必须在 iOS Safari 中请求权限
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        initSensors();
                    }
                } catch (e) {
                    statusText.innerText = "权限被拒绝";
                }
            } else {
                // 非 iOS 设备或旧版本
                initSensors();
            }
        }

        function initSensors() {
            isTracking = true;
            statusText.innerText = "实时感应中：请移动手机";
            document.getElementById('startBtn').style.display = 'none';

            window.addEventListener('devicemotion', (event) => {
                if (!isTracking) return;

                // 获取带重力补偿的加速度
                const acc = event.acceleration; 
                
                // 简单的积分算法：加速度 -> 速度 -> 位移
                // 在 iPhone 上，acc.x/y/z 的精度极高
                const dt = event.interval / 1000; // 时间间隔

                // 阈值过滤（消除手抖噪音）
                const threshold = 0.1;
                let ax = Math.abs(acc.x) > threshold ? acc.x : 0;
                let ay = Math.abs(acc.y) > threshold ? acc.y : 0;
                let az = Math.abs(acc.z) > threshold ? acc.z : 0;

                // 计算位移向量长度
                const moveSegment = Math.sqrt(ax*ax + ay*ay + az*az) * dt * dt * 0.5;
                distance += moveSegment;

                // 更新 UI
                valueDisplay.innerText = distance.toFixed(2);
                
                // 动态视觉反馈：根据移动强度改变雷达颜色深度
                const intensity = Math.min(255, distance * 50);
                radar.style.borderColor = `rgb(48, 209, 88)`;
                radar.style.transform = `scale(${1 + Math.min(acc.x, 0.5)})`;
            });
        }

        document.getElementById('startBtn').addEventListener('click', startSpaceTracking);
    </script>
</body>
</html>
