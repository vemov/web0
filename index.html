<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Orientation Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 10px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid #333; z-index: 10; }
        #force-overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; }
        #btn-confirm { padding: 20px 60px; background: #ffffff; color: #000; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="force-overlay">
    <p style="margin-bottom: 30px; opacity: 0.8;">系统要求：必须开启陀螺仪以载入空间</p>
    <button id="btn-confirm">确认并进入</button>
</div>

<div id="hud">VIEWPORT: LOCKED</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';

    let scene, camera, renderer, controls;
    let isRunning = false;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 0);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(100, 50, 0x222222, 0x111111);
        scene.add(grid);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(light);

        const geometry = new THREE.IcosahedronGeometry(0.5, 0);
        for(let i=0; i<100; i++) {
            const material = new THREE.MeshPhongMaterial({ color: 0x007aff, wireframe: true });
            const mesh = new THREE.Mesh(geometry, material);
            const r = 10 + Math.random() * 20;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            mesh.position.set(
                r * Math.sin(phi) * Math.cos(theta),
                Math.random() * 15,
                r * Math.sin(phi) * Math.sin(theta)
            );
            scene.add(mesh);
        }

        controls = new DeviceOrientationControls(camera);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isRunning) {
            controls.update();
            const { x, y, z } = camera.rotation;
            document.getElementById('hud').innerText = `X: ${x.toFixed(3)}\nY: ${y.toFixed(3)}\nZ: ${z.toFixed(3)}`;
            renderer.render(scene, camera);
        }
    }

    document.getElementById('btn-confirm').onclick = async () => {
        try {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const status = await DeviceOrientationEvent.requestPermission();
                if (status !== 'granted') {
                    alert("检测到权限拒绝。请重新点击确认并允许访问。");
                    return;
                }
            }
            
            document.getElementById('force-overlay').style.display = 'none';
            isRunning = true;
            init();
            animate();
            
        } catch (e) {
            console.error(e);
            alert("请在移动设备浏览器中打开此页面。");
        }
    };

    window.addEventListener('resize', () => {
        if (!camera) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
