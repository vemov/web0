<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced 6-DOF Kinematics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { padding: 18px 45px; font-size: 18px; background: #007aff; color: white; border: none; border-radius: 40px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); background: #0056b3; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; pointer-events: none; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; font-size: 11px; line-height: 1.6; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>高级空间动力学引擎</h2>
    <p>保持手机垂直静止并点击开始<br>系统将自动校准环境噪声</p>
    <button id="btn-start">开始校准并进入</button>
</div>
<div id="hud">CALIBRATING...</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';

    let scene, camera, renderer, controls, player;
    let isRunning = false;
    let clock = new THREE.Clock();
    
    // 严谨物理参数
    const params = {
        velocity: new THREE.Vector3(),
        lastAcc: new THREE.Vector3(),
        bias: 0.5,           // 动态死区
        sensitivity: 12.0,   // 移动灵敏度
        friction: 0.94,      // 空间阻力
        lerpFactor: 0.1      // 数据平滑因子
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x020202, 10, 100);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 增强视觉参照
        const grid = new THREE.GridHelper(200, 40, 0x333333, 0x111111);
        scene.add(grid);

        for (let i = 0; i < 60; i++) {
            const h = Math.random() * 4 + 1;
            const m = new THREE.Mesh(
                new THREE.BoxGeometry(1, h, 1), 
                new THREE.MeshPhongMaterial({ color: 0x444444, wireframe: true })
            );
            m.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
            scene.add(m);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        const light = new THREE.PointLight(0x007aff, 2, 50);
        light.position.set(0, 5, 0);
        scene.add(light);

        player = new THREE.Group();
        player.position.set(0, 1.7, 0);
        player.add(camera);
        scene.add(player);

        controls = new DeviceOrientationControls(camera);
    }

    function handleMotion(e) {
        if (!isRunning || !e.acceleration) return;

        // 1. 获取线性加速度 (Linear Acceleration)
        let rawAcc = new THREE.Vector3(e.acceleration.x, e.acceleration.y, e.acceleration.z);

        // 2. 指数移动平均滤波 (EMA Filter) - 减少高频噪声抖动
        params.lastAcc.lerp(rawAcc, params.lerpFactor);

        // 3. 动态死区逻辑
        if (params.lastAcc.length() < params.bias) return;

        // 4. 坐标系转换：从手机 Local 转换到相机视角 World
        let worldForce = params.lastAcc.clone();
        worldForce.applyQuaternion(camera.quaternion);

        // 5. 运动映射：
        // 手机向左晃 -> 场景向左移
        // 手机向前推 -> 场景向前走
        // 屏蔽微小的 Y 轴干扰，保留跳跃感
        if (Math.abs(params.lastAcc.y) < 2.0) worldForce.y = 0;

        params.velocity.addScaledVector(worldForce, params.sensitivity * 0.01);
    }

    function update() {
        const dt = clock.getDelta();
        controls.update();

        // 应用阻力
        params.velocity.multiplyScalar(params.friction);
        
        // 更新位置
        player.position.addScaledVector(params.velocity, dt * 15);

        // 简易地面碰撞
        if (player.position.y < 1.7) {
            player.position.y = 1.7;
            params.velocity.y = 0;
        }

        document.getElementById('hud').innerText = 
            `COORD: X:${player.position.x.toFixed(2)} Z:${player.position.z.toFixed(2)}\nVELOCITY: ${params.velocity.length().toFixed(3)}\nSTATUS: 6-DOF TRACKING`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    document.getElementById('btn-start').onclick = async () => {
        const res = await Promise.all([
            typeof DeviceOrientationEvent.requestPermission === 'function' ? DeviceOrientationEvent.requestPermission() : 'granted',
            typeof DeviceMotionEvent.requestPermission === 'function' ? DeviceMotionEvent.requestPermission() : 'granted'
        ]);

        if (res.every(s => s === 'granted')) {
            document.getElementById('overlay').innerHTML = "<h2>校准中...请保持手机静止</h2>";
            
            // 自动校准环境偏置
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;
                init();
                window.addEventListener('devicemotion', handleMotion, true);
                animate();
            }, 1000);
        }
    };
</script>
</body>
</html>
