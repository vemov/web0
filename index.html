<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Kinematics - Ground & Jump</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 16px 40px; font-size: 18px; cursor: pointer;
            background: #007aff; color: white; border: none; border-radius: 30px;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0;
            font-family: monospace; pointer-events: none; line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h2>物理反馈模式</h2>
    <p>倾斜手机移动 | 握紧手机向上跳跃</p>
    <button id="btn-start">授权并开始</button>
</div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, ball;
    let isRunning = false;
    let clock = new THREE.Clock();
    
    const velocity = new THREE.Vector3();
    const gravity = -18.0; 
    const jumpStrength = 8.0;
    const moveStrength = 45.0;
    const friction = 0.92;
    const angleDeadzone = 0.15; 
    const jumpThreshold = 15.0; 

    const state = { alpha: 0, beta: 90, gamma: 0, canJump: true };
    let baseBeta = 90;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(500, 50, 0x888888, 0x222222);
        scene.add(grid);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide })
        );
        floor.rotation.x = Math.PI / 2;
        scene.add(floor);

        for (let i = 0; i < 50; i++) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(4, 4, 4),
                new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
            );
            mesh.position.set(Math.random()*200-100, 2, Math.random()*200-100);
            scene.add(mesh);
        }

        scene.add(new THREE.DirectionalLight(0xffffff, 1));
        scene.add(new THREE.AmbientLight(0x404040));

        ball = new THREE.Group();
        ball.position.y = 2.5; 
        ball.add(camera);
        scene.add(ball);
    }

    function handleMotion(e) {
        const acc = e.accelerationIncludingGravity;
        if (!acc) return;
        
        const totalAcc = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
        if (totalAcc > jumpThreshold && state.canJump && ball.position.y <= 2.51) {
            velocity.y = jumpStrength;
            state.canJump = false;
            setTimeout(() => { state.canJump = true; }, 500);
        }
    }

    function handleOrientation(e) {
        state.alpha = e.alpha || 0;
        state.beta = e.beta || 90;
        state.gamma = e.gamma || 0;
    }

    function update(dt) {
        const d2r = Math.PI / 180;
        ball.quaternion.setFromEuler(new THREE.Euler(
            (state.beta - 90) * d2r,
            state.alpha * d2r,
            -state.gamma * d2r,
            'YXZ'
        ));

        const rawForce = (baseBeta - state.beta) / 45;
        if (Math.abs(rawForce) > angleDeadzone) {
            const force = rawForce - (Math.sign(rawForce) * angleDeadzone);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(ball.quaternion);
            dir.y = 0; 
            dir.normalize();
            velocity.addScaledVector(dir, force * moveStrength * dt);
        } else {
            velocity.x *= friction;
            velocity.z *= friction;
        }

        velocity.y += gravity * dt;
        ball.position.addScaledVector(velocity, dt);

        if (ball.position.y < 2.5) {
            ball.position.y = 2.5;
            velocity.y = 0;
        }

        document.getElementById('hud').innerText = `ALT: ${ball.position.y.toFixed(2)}\nSPD: ${velocity.length().toFixed(2)}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update(clock.getDelta());
        renderer.render(scene, camera);
    }

    document.getElementById('btn-start').onclick = function() {
        const p1 = typeof DeviceOrientationEvent.requestPermission === 'function' ? 
                   DeviceOrientationEvent.requestPermission() : Promise.resolve('granted');
        const p2 = typeof DeviceMotionEvent.requestPermission === 'function' ? 
                   DeviceMotionEvent.requestPermission() : Promise.resolve('granted');

        Promise.all([p1, p2]).then(results => {
            if (results.every(r => r === 'granted')) start();
        });
    };

    function start() {
        document.getElementById('overlay').style.display = 'none';
        isRunning = true;
        init();
        window.addEventListener('deviceorientation', handleOrientation);
        window.addEventListener('devicemotion', handleMotion);
        setTimeout(() => { baseBeta = state.beta; }, 200);
        animate();
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
