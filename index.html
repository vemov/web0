<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6-DOF Sensor Fusion Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { padding: 18px 45px; font-size: 20px; background: #007aff; color: white; border: none; border-radius: 35px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,122,255,0.4); }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 12px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>全空间运动模拟</h1>
    <p>旋转手机查看四周<br>物理走动、原地踏步或平移触发位移</p>
    <button id="btn-start">初始化 6-DOF 追踪</button>
</div>
<div id="hud">WAITING...</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';

    let scene, camera, renderer, worldContainer;
    let isRunning = false;
    let clock = new THREE.Clock();

    const motionState = {
        orientation: new THREE.Quaternion(),
        velocity: new THREE.Vector3(),
        position: new THREE.Vector3(0, 1.7, 0),
        stepCooldown: 0
    };

    const CONFIG = {
        STEP_THRESHOLD: 1.5, // 步态检测阈值 (m/s²)
        STEP_DISTANCE: 0.6,  // 单步位移量 (米)
        LATERAL_THRESHOLD: 1.2, // 侧移检测阈值
        FRICTION: 0.85,      // 惯性摩擦
        GROUND_Y: 1.7        // 相机高度（模拟身高）
    };

    function initScene() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 100);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 40, 0x444444, 0x222222);
        scene.add(grid);

        for (let i = 0; i < 80; i++) {
            const geometry = new THREE.BoxGeometry(1, Math.random() * 5, 1);
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(Math.random() * 100 - 50, cube.geometry.parameters.height/2, Math.random() * 100 - 50);
            scene.add(cube);
        }

        scene.add(new THREE.AmbientLight(0x404040));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        window.addEventListener('resize', onResize);
    }

    function handleOrientation(e) {
        if (!e.alpha) return;
        const d2r = Math.PI / 180;
        const euler = new THREE.Euler(
            (e.beta - 90) * d2r, 
            e.alpha * d2r, 
            -e.gamma * d2r, 
            'YXZ'
        );
        motionState.orientation.setFromEuler(euler);
    }

    function handleMotion(e) {
        if (!isRunning || !e.acceleration) return;

        const acc = e.acceleration; 
        const accVec = new THREE.Vector3(acc.x, acc.y, acc.z);
        const force = accVec.length();

        if (motionState.stepCooldown <= 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(motionState.orientation);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(motionState.orientation);
            forward.y = 0; forward.normalize();
            right.y = 0; right.normalize();

            let moved = false;

            if (acc.z < -CONFIG.STEP_THRESHOLD) { // 物理向前
                motionState.velocity.addScaledVector(forward, CONFIG.STEP_DISTANCE);
                moved = true;
            } else if (acc.z > CONFIG.STEP_THRESHOLD) { // 物理向后
                motionState.velocity.addScaledVector(forward, -CONFIG.STEP_DISTANCE);
                moved = true;
            }

            if (Math.abs(acc.x) > CONFIG.LATERAL_THRESHOLD) { // 物理侧移
                motionState.velocity.addScaledVector(right, -acc.x * 0.2);
                moved = true;
            }

            if (moved) motionState.stepCooldown = 0.3; // 300ms 采样冷却
        }
    }

    function update() {
        const dt = clock.getDelta();
        if (motionState.stepCooldown > 0) motionState.stepCooldown -= dt;

        camera.quaternion.copy(motionState.orientation);

        motionState.velocity.multiplyScalar(CONFIG.FRICTION);
        motionState.position.addScaledVector(motionState.velocity, dt * 10);
        
        camera.position.copy(motionState.position);

        document.getElementById('hud').innerText = 
            `POS: ${motionState.position.x.toFixed(2)}, ${motionState.position.z.toFixed(2)}\nVEL: ${motionState.velocity.length().toFixed(2)}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('btn-start').onclick = async () => {
        try {
            const ori = typeof DeviceOrientationEvent.requestPermission === 'function' ? 
                await DeviceOrientationEvent.requestPermission() : 'granted';
            const mot = typeof DeviceMotionEvent.requestPermission === 'function' ? 
                await DeviceMotionEvent.requestPermission() : 'granted';

            if (ori === 'granted' && mot === 'granted') {
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;
                initScene();
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                animate();
            }
        } catch (e) {
            alert("请在 HTTPS 环境下使用，并授予传感器权限。");
        }
    };
</script>
</body>
</html>
