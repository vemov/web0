<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Three.js 陀螺仪第一人称控制</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background-color: #007aff; color: white; border: none; border-radius: 25px;
            margin-bottom: 20px;
        }
    }
    </style>
</head>
<body>

<div id="overlay">
    <h2>3D 陀螺仪控制小球</h2>
    <p>操作说明：</p>
    <ul>
        <li>左右转动手机：旋转视角</li>
        <li>向前倾斜手机：小球向前走动</li>
    </ul>
    <p style="color: #aaa; font-size: 14px;">(需 HTTPS 环境)</p>
    <button id="btn-start">开始运行</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, ball;
    let containerSize = 100; // “大箱子”的边长
    let ballRadius = 2;

    // 物理与状态变量
    let deviceOrientation = {}; // 存储原始传感器数据
    let moveSpeed = 0; // 当前前进速度
    let isRunning = false;
    let clock = new THREE.Clock();

    const overlay = document.getElementById('overlay');
    const btnStart = document.getElementById('btn-start');

    // 1. 初始化 Three.js 场景
    function initThree() {
        // --- 场景 (Scene) ---
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a1a1a, 10, containerSize); // 添加雾化效果增强距离感

        // --- 摄像机 (Camera) ---
        // 第一人称视角，将摄像机放在小球内部或稍微上方
        camera = new THREE.Camera(); // 我们将使用传感器数据直接控制摄像机，不需要透视矩阵设置
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, ballRadius * 0.8, 0); // 将相机视角置于小球“头部”位置

        // --- 渲染器 (Renderer) ---
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x1a1a1a);
        document.body.appendChild(renderer.domElement);

        // --- 光照 (Lights) ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xfffffff, 0.5);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        // --- 环境：大箱子 (The Big Box) ---
        // 我们使用一个反面的立方体，让纹理贴在箱子内部
        const boxGeometry = new THREE.BoxGeometry(containerSize, containerSize, containerSize);
        
        // 为箱子内壁加载网格纹理以增强运动感
        const textureLoader = new THREE.TextureLoader();
        const gridTexture = textureLoader.load('https://threejs.org/examples/textures/grid.png');
        gridTexture.wrapS = gridTexture.wrapT = THREE.RepeatWrapping;
        gridTexture.repeat.set(10, 10); // 纹理重复次数

        const boxMaterial = new THREE.MeshPhongMaterial({
            color: 0x333333,
            map: gridTexture,
            side: THREE.BackSide, // 核心：让材质贴在几何体背面（内部）
        });
        const skybox = new THREE.Mesh(boxGeometry, boxMaterial);
        scene.add(skybox);

        // --- 小球 (The Ball) ---
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMaterial = new THREE.MeshPhongMaterial({
            color: 0x007aff,
            specular: 0x555555,
            shininess: 30,
        });
        ball = new THREE.Mesh(ballGeometry, ballMaterial);
        // 为了实现第一人称，将小球本身放在 (0,0,0) 并将摄像机作为子对象绑定
        ball.add(camera); 
        scene.add(ball);

        // 处理窗口缩放
        window.addEventListener('resize', onWindowResize, false);
    }

    // 2. 获取陀螺仪数据
    function handleOrientation(event) {
        // 只有开启后才记录数据
        if (!isRunning) return;
        
        // 严谨：iOS 的 alpha 数据需要做特殊处理才能作为指南针使用
        // 但这里我们只用相对旋转，可以直接使用
        deviceOrientation.alpha = event.alpha; // 绕Z轴，0-360，指南针朝向
        deviceOrientation.beta = event.beta;   // 前后倾斜，-180-180
        deviceOrientation.gamma = event.gamma; // 左右倾斜，-90-90
    }

    // 3. 核心循环：将传感器数据转换为 3D 运动
    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);

        const delta = clock.getDelta(); // 获取两帧之间的时间差（秒）

        if (deviceOrientation.alpha !== undefined) {
            // --- 严谨的视角旋转映射 ---
            // Three.js 使用弧度制。Alpha 是角度，我们需要转换并应用为小球的 Y 轴旋转。
            // Alpha 的 0 度通常意味着设备顶部指向正北。
            const alphaRad = THREE.MathUtils.degToRad(deviceOrientation.alpha);
            
            // 为了让旋转感觉“自然”（即手机怎么转，视角怎么转），
            // 我们需要应用一个负的 alpha 值。
            ball.rotation.y = -alphaRad;

            // --- 向前走动映射 ---
            // 我们使用 Beta 角控制向前速度。
            // 假设 Beta 的初始静止状态是平放（~0°），或稍微倾斜看屏幕（~45°）。
            // 严谨起见，我们将“静止状态”定义为 45 度，任何小于 45 度（更平）或大于 45 度（向后）的状态都代表不同速度。
            // 这里我们采用简单逻辑：小于 45 度为向前，越平越快。
            
            const targetBeta = deviceOrientation.beta;
            const threshold = 45; // 设定的“静止角度”
            const maxTilt = 45; // 最大允许倾斜角度偏移量
            const maxSpeed = 20; // 最大速度（单位/秒）

            if (targetBeta < threshold) {
                // 计算倾斜量 (0 到 45)
                const tiltForward = threshold - targetBeta;
                // 将倾斜量映射到速度 (0 到 maxSpeed)
                moveSpeed = (tiltForward / maxTilt) * maxSpeed;
            } else {
                // 大于 45 度停止或缓慢后退（这里设为停止）
                moveSpeed = 0;
            }

            // --- 应用运动 ---
            // 获取小球当前面向的方向（即 Y 轴旋转后的 Z 轴方向）
            const forwardVector = new THREE.Vector3(0, 0, -1);
            forwardVector.applyQuaternion(ball.quaternion);

            // 沿着面向方向移动小球位置
            ball.position.addScaledVector(forwardVector, moveSpeed * delta);
        }

        // --- 边界检测（严谨性） ---
        // 确保小球和相机不会滑出大箱子
        const limit = (containerSize / 2) - ballRadius;
        ball.position.x = THREE.MathUtils.clamp(ball.position.x, -limit, limit);
        ball.position.z = THREE.MathUtils.clamp(ball.position.z, -limit, limit);

        renderer.render(scene, camera);
    }

    // 4. 权限与初始化流程
    btnStart.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            // iOS 13+ 流程
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        startScene();
                    } else {
                        alert('权限被拒绝，无法使用陀螺仪控制。');
                    }
                })
                .catch(console.error);
        } else {
            // Android / 旧版 iOS 流程
            startScene();
        }
    };

    function startScene() {
        overlay.style.display = 'none';
        isRunning = true;
        initThree();
        window.addEventListener('deviceorientation', handleOrientation);
        clock.start(); // 开始计时
        animate(); // 启动循环
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
