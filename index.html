<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 空间运动学控制</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px;
        }
        button {
            padding: 16px 40px; font-size: 20px; cursor: pointer;
            background: linear-gradient(45deg, #007aff, #00c6ff);
            color: white; border: none; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,122,255,0.4);
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0;
            font-family: monospace; font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1>空间动力学模拟</h1>
    <p>视角：全向旋转手机以环视四周<br>移动：向前倾斜加速，向后倾斜减速/后退</p>
    <button id="btn-start">授权并开启</button>
</div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, ball, grid;
    let isRunning = false;
    let clock = new THREE.Clock();
    
    // 运动学参数
    const velocity = new THREE.Vector3();
    const acceleration = new THREE.Vector3();
    const friction = 0.96; // 空气阻力
    const moveStrength = 40.0; // 动力强度
    
    // 传感器数据
    const deviceRotation = { alpha: 0, beta: 0, gamma: 0 };
    const hud = document.getElementById('hud');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 建立一个无限感官的 3D 网格空间
        const size = 1000;
        const divisions = 100;
        grid = new THREE.GridHelper(size, divisions, 0x444444, 0x222222);
        scene.add(grid);

        // 添加一些随机漂浮的目标物以参照运动
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        for (let i = 0; i < 100; i++) {
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(Math.random()*400-200, Math.random()*400-200, Math.random()*400-200);
            scene.add(mesh);
        }

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 核心：第一人称容器
        ball = new THREE.Group();
        ball.add(camera);
        scene.add(ball);

        window.addEventListener('resize', onResize);
    }

    function handleOrientation(e) {
        deviceRotation.alpha = e.alpha; // Z
        deviceRotation.beta = e.beta;   // X
        deviceRotation.gamma = e.gamma; // Y
    }

    function updatePhysics(dt) {
        // 1. 处理视角旋转 (使用 Euler 角映射到四元数，确保全向无死锁)
        // 严谨逻辑：Alpha 对应 Y 轴（左右），Beta 对应 X 轴（上下），Gamma 对应 Z 轴（翻滚）
        const d2r = Math.PI / 180;
        const euler = new THREE.Euler(
            deviceRotation.beta * d2r,
            deviceRotation.alpha * d2r,
            -deviceRotation.gamma * d2r,
            'YXZ'
        );
        ball.quaternion.setFromEuler(euler);

        // 2. 计算动力学移动
        // 我们定义：Beta 偏离 45 度（舒适手持角度）为推力来源
        const tiltThreshold = 45;
        const tiltForce = (tiltThreshold - deviceRotation.beta) / 45; // -1 到 1 之间的推力系数
        
        if (Math.abs(tiltForce) > 0.1) {
            // 提取当前摄像机在世界坐标系中的正前方向
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(ball.quaternion);
            
            // 应用加速度： F = ma -> a = F/m
            acceleration.copy(direction).multiplyScalar(tiltForce * moveStrength);
            velocity.addScaledVector(acceleration, dt);
        }

        // 3. 应用摩擦力和位移积分
        velocity.multiplyScalar(friction);
        ball.position.addScaledVector(velocity, dt);

        // 更新 HUD
        hud.innerText = `POS: ${ball.position.x.toFixed(1)}, ${ball.position.y.toFixed(1)}, ${ball.position.z.toFixed(1)}\nSPD: ${velocity.length().toFixed(2)}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        updatePhysics(dt);
        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('btn-start').onclick = function() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') start();
            });
        } else {
            start();
        }
    };

    function start() {
        document.getElementById('overlay').style.display = 'none';
        isRunning = true;
        init();
        window.addEventListener('deviceorientation', handleOrientation);
        animate();
    }
</script>
</body>
</html>
