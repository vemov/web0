<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 空间 - VR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-family: monospace; font-size: 10px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 4px; border: 1px solid #333; z-index: 10; letter-spacing: 1px; }
        #force-overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; }
        #btn-confirm { padding: 18px 50px; background: transparent; color: #fff; border: 1px solid #fff; cursor: pointer; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; transition: all 0.3s; }
        #btn-confirm:hover { background: #fff; color: #000; }
        #progress-container { width: 200px; height: 1px; background: #222; display: none; overflow: hidden; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #fff; transition: width 0.3s; }
        #progress-text { margin-top: 15px; font-size: 10px; color: #444; font-family: monospace; text-transform: uppercase; }
        #pc-blocked-overlay { position: fixed; inset: 0; z-index: 10000; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; padding: 40px; }
        .pc-icon { font-size: 48px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #ff3b30); }
        .pc-msg-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; }
        .pc-msg-body { font-size: 13px; color: #888; line-height: 1.6; max-width: 280px; }
    </style>
</head>
<body>

<div id="force-overlay">
    <button id="btn-confirm">进入3D空间</button>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="progress-text">系统初始化中</div>
</div>

<div id="hud">系统状态: 待机</div>

<div id="pc-blocked-overlay">
    <div class="pc-icon">检测为PC端</div>
    <div class="pc-msg-title">请使用移动设备访问</div>
    <div class="pc-msg-body">当前场景依赖陀螺仪传感器进行视角控制，请通过手机浏览器扫描或访问以获得最佳体验。</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let isRunning = false;

    function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(1, -1.5, 1); 
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.physicallyCorrectLights = true;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const light = new THREE.DirectionalLight(0xffffff, 2.5);
        light.position.set(5, 10, 7.5);
        scene.add(light);

        const fillLight = new THREE.PointLight(0xffffff, 1.0);
        fillLight.position.set(-5, -5, -5);
        scene.add(fillLight);

        loadModel();
        controls = new DeviceOrientationControls(camera);
    }

    function loadModel() {
        const loader = new GLTFLoader();
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('progress-text');
        document.getElementById('progress-container').style.display = 'block';

        loader.load(
            'demo/4444.glb',
            (gltf) => {
                const model = gltf.scene;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material.envMapIntensity = 1.5;
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); 
                scene.add(model);
                document.getElementById('force-overlay').style.display = 'none';
                isRunning = true;
                animate();
            },
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percent = (xhr.loaded / xhr.total * 100);
                    pBar.style.width = percent + '%';
                    pText.innerText = `资源同步中: ${Math.round(percent)}%`;
                }
            },
            (error) => {
                pText.innerText = '加载失败';
            }
        );
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isRunning) {
            controls.update();
            const { x, y } = camera.rotation;
            document.getElementById('hud').innerText = `垂直位面: ${x.toFixed(3)}\n水平位面: ${y.toFixed(3)}`;
            renderer.render(scene, camera);
        }
    }

    document.getElementById('btn-confirm').onclick = async () => {
        try {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return alert("权限请求被拒绝");
            }
            document.getElementById('btn-confirm').style.display = 'none';
            initScene();
        } catch (e) {
            alert("请使用HTTPS协议并在移动设备访问");
        }
    };

    (function() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (!isMobile) {
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('pc-blocked-overlay').style.display = 'flex';
                const btn = document.getElementById('btn-confirm');
                if (btn) btn.disabled = true;
            });
        }
    })();

    window.addEventListener('resize', () => {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
