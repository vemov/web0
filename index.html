<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Kinematics - Neutral Frontal Control</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 16px 40px; font-size: 18px; cursor: pointer;
            background: #007aff; color: white; border: none; border-radius: 30px;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0;
            font-family: monospace; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="overlay">
    <button id="btn-start">授权进入界面</button>
</div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, ball;
    let isRunning = false;
    let clock = new THREE.Clock();
    
    const velocity = new THREE.Vector3();
    const acceleration = new THREE.Vector3();
    const friction = 0.95;
    const moveStrength = 40.0;
    const deadzone = 0.1;
    
    const deviceRotation = { alpha: 0, beta: 0, gamma: 0 };
    let baseBeta = 90; 
    let lastBeta = 90;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(1000, 100, 0x444444, 0x222222);
        scene.add(grid);

        for (let i = 0; i < 150; i++) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2, 2),
                new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
            );
            mesh.position.set(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
            scene.add(mesh);
        }

        scene.add(new THREE.DirectionalLight(0xffffff, 1));
        scene.add(new THREE.AmbientLight(0x404040));

        ball = new THREE.Group();
        ball.add(camera);
        scene.add(ball);

        window.addEventListener('resize', onResize);
    }

    function handleOrientation(e) {
        deviceRotation.alpha = e.alpha || 0;
        deviceRotation.beta = e.beta || 0;
        deviceRotation.gamma = e.gamma || 0;
    }

    function update(dt) {
        const d2r = Math.PI / 180;
        const euler = new THREE.Euler(
            (deviceRotation.beta - 90) * d2r,
            deviceRotation.alpha * d2r,
            -deviceRotation.gamma * d2r,
            'YXZ'
        );
        ball.quaternion.setFromEuler(euler);

        const rawForce = (baseBeta - deviceRotation.beta) / 45;
        let force = 0;
        if (Math.abs(rawForce) > deadzone) {
            force = rawForce - (Math.sign(rawForce) * deadzone);
        } else {
            velocity.multiplyScalar(0.85);
        }

        if (Math.abs(force) > 0) {
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(ball.quaternion);
            acceleration.copy(dir).multiplyScalar(force * moveStrength);
            velocity.addScaledVector(acceleration, dt);
        }

        velocity.multiplyScalar(friction);
        ball.position.addScaledVector(velocity, dt);

        document.getElementById('hud').innerText = `V: ${velocity.length().toFixed(2)}`;
    }

    function animate() {
        if (!isRunning) return;
        requestAnimationFrame(animate);
        update(clock.getDelta());
        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('btn-start').onclick = function() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') start();
            });
        } else {
            start();
        }
    };

    function start() {
        document.getElementById('overlay').style.display = 'none';
        isRunning = true;
        init();
        window.addEventListener('deviceorientation', handleOrientation);
        setTimeout(() => { baseBeta = deviceRotation.beta; }, 100);
        animate();
    }
</script>
</body>
</html>
