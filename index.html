<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Control Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #btn-start { padding: 20px 60px; font-size: 18px; background: #007aff; color: white; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; border: 1px solid #333; }
        
        /* 前进按钮样式 */
        #move-ctrl { 
            position: absolute; 
            bottom: 50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 80px; 
            height: 80px; 
            background: rgba(255,255,255,0.15); 
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; 
            display: none; 
            justify-content: center; 
            align-items: center;
            touch-action: none;
            -webkit-user-select: none;
            z-index: 50;
        }
        #move-ctrl:active { background: rgba(0,122,255,0.4); border-color: #007aff; scale: 0.95; }
        #move-ctrl::after { content: "▲"; color: white; font-size: 24px; }
    </style>
</head>
<body>

<div id="overlay">
    <h2>混合动力空间</h2>
    <p>倾斜手机旋转视角<br>长按下方按钮前进</p>
    <button id="btn-start">启动系统</button>
</div>

<div id="hud">STATUS: STANDBY</div>
<div id="move-ctrl"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
    import { DeviceOrientationControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/DeviceOrientationControls.js';

    let scene, camera, renderer, controls, player;
    let isRunning = false;
    let isMoving = false;
    let clock = new THREE.Clock();
    
    const physics = {
        vel: new THREE.Vector3(),
        speed: 8.0,      // 移动速度
        friction: 0.92,  // 惯性滑动阻力
        height: 1.7
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 20, 70);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 60, 0x444444, 0x222222);
        scene.add(grid);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);

        const sun = new THREE.PointLight(0x007aff, 1, 100);
        sun.position.set(0, 10, 0);
        scene.add(sun);

        for(let i=0; i<30; i++) {
            const h = Math.random() * 8 + 1;
            const box = new THREE.Mesh(
                new THREE.BoxGeometry(2, h, 2),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            box.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
            scene.add(box);
        }

        player = new THREE.Group();
        player.position.set(0, physics.height, 0);
        player.add(camera);
        scene.add(player);

        controls = new DeviceOrientationControls(camera);
    }

    function update() {
        const dt = clock.getDelta();
        if (!isRunning) return;

        controls.update();

        if (isMoving) {
            // 获取相机朝向的世界方向
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(camera.quaternion);
            dir.y = 0; // 锁定水平移动
            dir.normalize();
            
            // 动力加速
            physics.vel.addScaledVector(dir, physics.speed * dt);
        }

        // 应用阻力（物理惯性）
        physics.vel.multiplyScalar(physics.friction);

        // 更新位置
        player.position.add(physics.vel);

        document.getElementById('hud').innerText = `POS: X:${player.position.x.toFixed(2)} Z:${player.position.z.toFixed(2)}\nVEL: ${physics.vel.length().toFixed(3)}`;
    }

    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    const moveBtn = document.getElementById('move-ctrl');
    
    // 触摸事件处理
    moveBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isMoving = true; });
    moveBtn.addEventListener('touchend', () => { isMoving = false; });
    moveBtn.addEventListener('mousedown', () => { isMoving = true; });
    moveBtn.addEventListener('mouseup', () => { isMoving = false; });

    document.getElementById('btn-start').onclick = async () => {
        const res = typeof DeviceOrientationEvent.requestPermission === 'function' 
            ? await DeviceOrientationEvent.requestPermission() 
            : 'granted';

        if (res === 'granted') {
            document.getElementById('overlay').style.display = 'none';
            moveBtn.style.display = 'flex';
            isRunning = true;
            init();
            animate();
        }
    };

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
